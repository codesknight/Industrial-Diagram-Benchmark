<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Topology Panel v1.1 Still-Fragmented Diagnostic</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #fff;
      --ink: #101828;
      --muted: #667085;
      --border: #d8dee8;
      --dark: #111827;
      --ok: #0f7b45;
      --warn: #a35b00;
      --bad: #b42318;
      --info: #175cd3;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--ink);
    }
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      padding: 12px 16px;
      background: rgba(255,255,255,.96);
      border-bottom: 1px solid var(--border);
    }
    h1 {
      margin: 0 0 10px;
      font-size: 20px;
      font-weight: 680;
      letter-spacing: 0;
    }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    input[type="search"], select {
      height: 34px;
      min-width: 160px;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0 10px;
      background: #fff;
      color: var(--ink);
    }
    button {
      height: 34px;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0 12px;
      background: #fff;
      cursor: pointer;
      font-weight: 560;
    }
    button.primary {
      background: var(--dark);
      border-color: var(--dark);
      color: #fff;
    }
    .stats {
      margin-left: auto;
      font-size: 13px;
      color: var(--muted);
      white-space: nowrap;
    }
    main {
      padding: 14px;
      display: grid;
      gap: 14px;
    }
    .card {
      display: grid;
      grid-template-columns: minmax(420px, 1fr) 460px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      min-height: 360px;
    }
    .image-pane {
      min-height: 360px;
      border-right: 1px solid var(--border);
      background: #fbfcfe;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: auto;
      padding: 10px;
    }
    .image-pane img {
      max-width: 100%;
      max-height: 82vh;
      object-fit: contain;
    }
    .meta {
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-width: 0;
    }
    .title {
      font-size: 15px;
      font-weight: 680;
      overflow-wrap: anywhere;
    }
    .sub {
      color: var(--muted);
      font-size: 12px;
      overflow-wrap: anywhere;
    }
    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .badge {
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 3px 8px;
      font-size: 12px;
      background: #fff;
    }
    .badge.warn { color: var(--warn); border-color: #ffdca8; background: #fff8eb; }
    .badge.bad { color: var(--bad); border-color: #fecdca; background: #fff3f2; }
    .badge.ok { color: var(--ok); border-color: #b7e4c7; background: #f1fbf5; }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0,1fr));
      gap: 6px;
    }
    .metric {
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 7px 8px;
      min-width: 0;
    }
    .metric b {
      display: block;
      font-size: 12px;
      color: var(--muted);
      font-weight: 560;
    }
    .metric span {
      display: block;
      margin-top: 2px;
      font-size: 14px;
      font-weight: 670;
      overflow-wrap: anywhere;
    }
    textarea {
      width: 100%;
      min-height: 70px;
      resize: vertical;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px;
      font: inherit;
      font-size: 13px;
    }
    a { color: var(--info); text-decoration: none; overflow-wrap: anywhere; }
    @media (max-width: 980px) {
      .card { grid-template-columns: 1fr; }
      .image-pane { border-right: 0; border-bottom: 1px solid var(--border); }
      .stats { width: 100%; margin-left: 0; }
    }
  </style>
</head>

  <header>
    <h1>Topology Panel v1.1 Still-Fragmented Diagnostic</h1>
    <div class="toolbar">
      <input id="query" type="search" placeholder="panel / reason / model" />

      <select id="reviewFilter"><option value="">all review labels</option></select>
      <select id="emptyFilter">
        <option value="">all graph states</option>
        <option value="true">still empty</option>
        <option value="false">has edges</option>
      </select>
      <button id="clearBtn">Clear</button>
      <button id="exportBtn" class="primary">Export CSV</button>
      <span id="stats" class="stats"></span>
    </div>
  </header>

    }
    function filteredRows() {
      const q = query.value.trim().toLowerCase();
      return rows.filter(row => {
        const review = current(row.panel_id, row);
        if (suggestFilter.value && row.suggested_diagnostic_label !== suggestFilter.value) return false;
        if (reviewFilter.value && review.diagnostic_label !== reviewFilter.value) return false;
        if (emptyFilter.value && String(row.still_empty).toLowerCase() !== emptyFilter.value) return false;
        if (!q) return true;
        return [row.panel_id, row.parent_drawing_key, row.suggested_diagnostic_reason, row.model_review_label, row.model_reason, row.panel_entity_type_counts]
          .some(value => String(value || "").toLowerCase().includes(q));
      });
    }
    function render() {
      const visible = filteredRows();
      cards.innerHTML = visible.map(card).join("");
      const counts = rows.reduce((acc, row) => {
        const label = current(row.panel_id, row).diagnostic_label;
        acc[label] = (acc[label] || 0) + 1;
        return acc;
      }, {});
      stats.textContent = `${visible.length} / ${rows.length} visible | ` + labels.map(label => `${label} ${counts[label] || 0}`).join(" | ");
    }
    function csvEscape(value) {
      const text = String(value ?? "");
      return /[",\n\r]/.test(text) ? `"${text.replace(/"/g, '""')}"` : text;
    }
    function exportCsv() {
      const header = ["panel_id", "diagnostic_label", "comment", "suggested_diagnostic_label", "suggested_diagnostic_reason"];
      const lines = [header.join(",")];
      for (const row of rows) {
        const review = current(row.panel_id, row);
        lines.push([row.panel_id, review.diagnostic_label, review.comment || "", row.suggested_diagnostic_label, row.suggested_diagnostic_reason].map(csvEscape).join(","));
      }
      const blob = new Blob(["\ufeff" + lines.join("\n") + "\n"], { type: "text/csv;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "topology_panel_v1_1_still_fragmented_diagnostic_labels.csv";
      a.click();
      URL.revokeObjectURL(url);
    }
    populateFilters();
    for (const input of [query, suggestFilter, reviewFilter, emptyFilter]) {
      input.addEventListener("input", render);
      input.addEventListener("change", render);
    }
    document.getElementById("clearBtn").addEventListener("click", () => {
      query.value = "";
      suggestFilter.value = "";
      reviewFilter.value = "";
      emptyFilter.value = "";
      render();
    });
    document.getElementById("exportBtn").addEventListener("click", exportCsv);
    render();
  </script>
</body>
</html>
