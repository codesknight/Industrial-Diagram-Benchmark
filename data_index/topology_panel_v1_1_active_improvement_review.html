<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Topology Panel v1.1 Active Improvement Review</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --ink: #101828;
      --muted: #667085;
      --border: #d7dde7;
      --dark: #111827;
      --ok: #0f7b45;
      --warn: #a35b00;
      --bad: #b42318;
      --info: #175cd3;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--ink);
    }
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      padding: 12px 16px;
      background: rgba(255,255,255,.96);
      border-bottom: 1px solid var(--border);
    }
    h1 {
      margin: 0 0 10px;
      font-size: 20px;
      font-weight: 680;
      letter-spacing: 0;
    }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    input[type="search"], select {
      height: 34px;
      min-width: 160px;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0 10px;
      background: #fff;
      color: var(--ink);
    }
    button {
      height: 34px;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0 12px;
      background: #fff;
      cursor: pointer;
      font-weight: 560;
    }
    button.primary {
      background: var(--dark);
      border-color: var(--dark);
      color: #fff;
    }
    .stats {
      margin-left: auto;
      font-size: 13px;
      color: var(--muted);
      white-space: nowrap;
    }
    main {
      padding: 14px;
      display: grid;
      gap: 14px;
    }
    .card {
      display: grid;
      grid-template-columns: minmax(420px, 1fr) 470px;
      min-height: 360px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    .image-pane {
      min-height: 360px;
      border-right: 1px solid var(--border);
      background: #fbfcfe;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: auto;
      padding: 10px;
    }
    .image-pane img {
      max-width: 100%;
      max-height: 82vh;
      object-fit: contain;
    }
    .meta {
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-width: 0;
    }
    .title {
      font-size: 15px;
      font-weight: 680;
      overflow-wrap: anywhere;
    }
    .sub {
      color: var(--muted);
      font-size: 12px;
      overflow-wrap: anywhere;
    }
    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .badge {
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 3px 8px;
      font-size: 12px;
      background: #fff;
    }
    .terminal { color: var(--ok); border-color: #b7e4c7; background: #f1fbf5; }
    .over { color: var(--warn); border-color: #ffdca8; background: #fff8eb; }
    .bad { color: var(--bad); border-color: #fecdca; background: #fff3f2; }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0,1fr));
      gap: 6px;
    }
    .metric {
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 7px 8px;
      min-width: 0;
    }
    .metric b {
      display: block;
      font-size: 12px;
      color: var(--muted);
      font-weight: 560;
    }
    .metric span {
      display: block;
      margin-top: 2px;
      font-size: 14px;
      font-weight: 670;
      overflow-wrap: anywhere;
    }
    textarea {
      width: 100%;
      min-height: 72px;
      resize: vertical;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px;
      font: inherit;
      font-size: 13px;
    }
    a { color: var(--info); text-decoration: none; overflow-wrap: anywhere; }
    @media (max-width: 980px) {
      .card { grid-template-columns: 1fr; }
      .image-pane { border-right: 0; border-bottom: 1px solid var(--border); }
      .stats { width: 100%; margin-left: 0; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Topology Panel v1.1 Active Improvement Review</h1>
    <div class="toolbar">
      <input id="query" type="search" placeholder="panel / route / reason" />
      <select id="routeFilter">
        <option value="">all routes</option>
        <option value="terminal_anchor_module">terminal_anchor_module</option>
        <option value="over_connected_repair">over_connected_repair</option>
      </select>
      <select id="reviewFilter"><option value="">all review labels</option></select>
      <button id="clearBtn">Clear</button>
      <button id="exportBtn" class="primary">Export CSV</button>
      <span id="stats" class="stats"></span>
    </div>
  </header>
  <main id="cards"></main>

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, ch => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
      }[ch]));

    function current(id, row) {
      return saved[id] || { review_label: row.suggested_review_label, comment: "" };

    function save(id, patch) {

            ${metric("largest net", row.v1_largest_net_edge_ratio)}
