<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Industrial Diagram Topology v1 Pilot Review</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fa;
      --panel: #ffffff;
      --ink: #101828;
      --muted: #667085;
      --border: #d8dee8;
      --dark: #111827;
      --ok: #0f7b45;
      --warn: #a35b00;
      --bad: #b42318;
      --info: #175cd3;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: var(--bg);
    }
    header {
      position: sticky;
      top: 0;
      z-index: 5;
      padding: 12px 18px;
      background: rgba(255, 255, 255, 0.96);
      border-bottom: 1px solid var(--border);
    }
    h1 {
      margin: 0 0 10px;
      font-size: 20px;
      font-weight: 650;
      letter-spacing: 0;
    }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    input[type="search"], select {
      height: 34px;
      min-width: 170px;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0 10px;
      background: #fff;
      color: var(--ink);
    }
    button {
      height: 34px;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0 12px;
      background: #fff;
      color: var(--ink);
      cursor: pointer;
      font-weight: 550;
    }
    button.primary {
      background: var(--dark);
      border-color: var(--dark);
      color: #fff;
    }
    .stats {
      margin-left: auto;
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }
    main {
      padding: 16px;
      display: grid;
      gap: 14px;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      display: grid;
      grid-template-columns: minmax(420px, 1fr) 480px;
      min-height: 390px;
      overflow: hidden;
    }
    .image-wrap {
      min-height: 390px;
      border-right: 1px solid var(--border);
      background: #fcfcfd;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: auto;
      padding: 10px;
    }
    .image-wrap img {
      max-width: 100%;
      max-height: 80vh;
      object-fit: contain;
      border: 1px solid #edf0f5;
      background: #fff;
    }
    .meta {
      padding: 12px;
      display: grid;
      gap: 10px;
      align-content: start;
    }
    .title {
      font-size: 13px;
      line-height: 1.4;
      word-break: break-all;
    }
    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .badge {
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 3px 8px;
      font-size: 12px;
      color: var(--muted);
      background: #fff;
    }
    .badge.review { color: var(--warn); border-color: #fedf89; background: #fffbeb; }
    .metrics {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }
    .metric {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px;
      min-width: 0;
    }
    .metric strong {
      display: block;
      font-size: 16px;
      line-height: 1.15;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .metric span {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 11px;
    }
    .compare {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }
    .compare .metric strong { font-size: 15px; }
    .choices {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px;
    }
    .choice {
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 6px;
      text-align: center;
      cursor: pointer;
      user-select: none;
      font-size: 12px;
      font-weight: 650;
      min-height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .choice.active[data-value="accept_v1"] { border-color: var(--ok); color: var(--ok); background: #ecfdf3; }
    .choice.active[data-value="over_connected"] { border-color: var(--bad); color: var(--bad); background: #fff1f0; }
    .choice.active[data-value="still_fragmented"] { border-color: var(--warn); color: var(--warn); background: #fff7e8; }
    .choice.active[data-value="needs_terminal_anchor"] { border-color: var(--info); color: var(--info); background: #eff6ff; }
    .choice.active[data-value="bad_geometry"] { border-color: #7a271a; color: #7a271a; background: #fff1f0; }
    textarea {
      width: 100%;
      min-height: 70px;
      resize: vertical;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px;
      font-family: inherit;
      color: var(--ink);
    }
    .kv {
      display: grid;
      grid-template-columns: 120px minmax(0, 1fr);
      gap: 5px 8px;
      font-size: 12px;
      color: var(--muted);
    }
    .kv code, .kv a {
      color: var(--ink);
      word-break: break-all;
      white-space: pre-wrap;
    }
    .kv a { text-decoration: none; }
    .kv a:hover { text-decoration: underline; }
    @media (max-width: 1120px) {
      .card { grid-template-columns: 1fr; }
      .image-wrap { border-right: 0; border-bottom: 1px solid var(--border); }
      .stats { width: 100%; margin-left: 0; }
    }
  </style>
</head>

      <button id="exportCsv" class="primary">导出 CSV</button>
      <span id="stats" class="stats"></span>
    </div>
  </header>
